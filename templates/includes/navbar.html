{% load static %}

<header class="site-header">
  <div class="site-header-inner">
    <a href="{% url 'core:landing' %}" class="site-logo-wrap" aria-label="mathner home">
      <span class="site-logo-badge">m</span>
      <span class="site-logo-text">mathner</span>
    </a>

    <nav class="site-nav-center desktop-only" aria-label="Primary">
      <a href="javascript:void(0)" class="js-nav-link" data-target="why-mathner">Features</a>
      <a href="javascript:void(0)" class="js-nav-link" data-target="screen-showcase">How It Works</a>
      <a href="javascript:void(0)" class="js-nav-link" data-target="pricing">Pricing</a>
      <a href="javascript:void(0)" class="js-nav-link" data-target="ranking-preview">Rank</a>
      <a href="javascript:void(0)" class="js-nav-link" data-target="avatar">Avatar</a>
    </nav>

    <div class="mobile-header-right mobile-only">
      <button
        type="button"
        class="mobile-menu-btn"
        id="mobileMenuBtn"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="mobileNavDrawer"
      >
        ☰
      </button>
    </div>
  </div>

  <div class="mobile-nav-drawer mobile-only" id="mobileNavDrawer">
    <div class="mobile-drawer-card">
      <div class="mobile-drawer-top">
        <div class="mobile-drawer-title">Menu</div>
        <button
          type="button"
          class="mobile-drawer-close"
          id="mobileMenuClose"
          aria-label="Close menu"
        >
          ✕
        </button>
      </div>

      <div class="mobile-drawer-links">
        <a href="javascript:void(0)" class="mobile-drawer-link js-nav-link" data-target="why-mathner">
          Features
        </a>
        <a href="javascript:void(0)" class="mobile-drawer-link js-nav-link" data-target="screen-showcase">
          How It Works
        </a>
        <a href="javascript:void(0)" class="mobile-drawer-link js-nav-link" data-target="pricing">
          Pricing
        </a>
        <a href="javascript:void(0)" class="mobile-drawer-link js-nav-link" data-target="ranking-preview">
          Rank
        </a>
        <a href="javascript:void(0)" class="mobile-drawer-link js-nav-link" data-target="avatar">
          Avatar
        </a>

        <a href="{% url 'core:play' %}" class="mobile-drawer-link mobile-drawer-link-primary">
          Start Playing
        </a>
      </div>
    </div>
  </div>
</header>

<style>
  html{
    scroll-behavior:smooth;
  }

  .site-header{
    position:sticky;
    top:0;
    z-index:13000;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(20,30,55,.08);
  }

  .site-header-inner{
    width:min(1180px, calc(100% - 24px));
    padding-left:30px;
    margin:0 auto;
    min-height:78px;
    display:grid;
    grid-template-columns:auto 1fr;
    align-items:center;
    column-gap:24px;
  }

  .site-logo-wrap{
    display:inline-flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    justify-self:start;
  }

  .site-logo-badge{
    width:38px;
    height:38px;
    border-radius:12px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg, #7ea8ff 0%, #67e0cb 100%);
    color:#4b49f5;
    font-size:28px;
    font-weight:1000;
    line-height:1;
    box-shadow:0 10px 24px rgba(98,148,255,.22);
  }

  .site-logo-text{
    color:#4b49f5;
    font-size:22px;
    font-weight:1000;
    line-height:1;
    letter-spacing:-0.02em;
  }

  .site-nav-center{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:42px;
    min-width:0;
    width:100%;
  }

  .site-nav-center a{
    position:relative;
    color:#253045;
    text-decoration:none;
    font-size:16px;
    font-weight:800;
    letter-spacing:-0.01em;
    white-space:nowrap;
    transition:color .18s ease, transform .18s ease;
  }

  .site-nav-center a:hover{
    color:#4b49f5;
    transform:translateY(-1px);
  }

  .site-nav-center a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-8px;
    width:100%;
    height:2px;
    border-radius:999px;
    background:linear-gradient(90deg, #7ea8ff 0%, #67e0cb 100%);
    transform:scaleX(0);
    transform-origin:center;
    transition:transform .18s ease;
  }

  .site-nav-center a:hover::after{
    transform:scaleX(1);
  }

  .mobile-only{
    display:none;
  }

  .mobile-header-right{
    display:none;
  }

  .mobile-menu-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:12px;
    background:#eef1f7;
    color:#223048;
    font-size:22px;
    font-weight:1000;
    cursor:pointer;
    flex:0 0 auto;
  }

  .mobile-nav-drawer{
    display:none;
  }

  .mobile-nav-drawer.is-open{
    display:block;
  }

  @media (max-width: 900px){
    .site-nav-center{
      gap:24px;
    }

    .site-nav-center a{
      font-size:14px;
    }
  }

  @media (max-width: 768px){
    .desktop-only{
      display:none !important;
    }

    .mobile-only{
      display:block;
    }

    .site-header-inner{
      width:calc(100% - 16px);
      min-height:64px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .site-logo-wrap{
      gap:10px;
    }

    .site-logo-badge{
      width:34px;
      height:34px;
      font-size:24px;
      border-radius:11px;
    }

    .site-logo-text{
      font-size:20px;
    }

    .mobile-header-right{
      display:flex;
      align-items:center;
      gap:8px;
      margin-left:auto;
    }

    .mobile-nav-drawer{
      position:fixed;
      inset:64px 0 0 0;
      background:rgba(0,0,0,.42);
      backdrop-filter:blur(3px);
      -webkit-backdrop-filter:blur(3px);
      padding:10px 8px 18px;
      z-index:14000;
    }

    .mobile-drawer-card{
      border-radius:18px;
      background:#ffffff;
      padding:12px;
      box-shadow:0 18px 42px rgba(0,0,0,.18);
    }

    .mobile-drawer-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:10px;
    }

    .mobile-drawer-title{
      font-size:16px;
      font-weight:1000;
      color:#1e2940;
    }

    .mobile-drawer-close{
      width:38px;
      height:38px;
      border:none;
      border-radius:12px;
      background:#eef1f7;
      color:#223048;
      font-size:18px;
      font-weight:1000;
      cursor:pointer;
    }

    .mobile-drawer-links{
      display:grid;
      gap:8px;
    }

    .mobile-drawer-link{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      border-radius:14px;
      text-decoration:none;
      font-weight:900;
      color:#223048;
      background:#f5f7fb;
      border:1px solid rgba(20,30,55,.08);
      cursor:pointer;
    }

    .mobile-drawer-link-primary{
      background:linear-gradient(135deg, #7ea8ff 0%, #67e0cb 100%);
      color:#07101d;
      border-color:transparent;
      box-shadow:0 10px 22px rgba(95,161,255,.16);
    }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const btn = document.getElementById("mobileMenuBtn");
    const closeBtn = document.getElementById("mobileMenuClose");
    const drawer = document.getElementById("mobileNavDrawer");
    const landingPath = "{% url 'core:landing' %}";

    function openDrawer() {
      if (!drawer || !btn) return;
      drawer.classList.add("is-open");
      btn.setAttribute("aria-expanded", "true");
      document.body.style.overflow = "hidden";
    }

    function closeDrawer() {
      if (!drawer || !btn) return;
      drawer.classList.remove("is-open");
      btn.setAttribute("aria-expanded", "false");
      document.body.style.overflow = "";
    }

    function getHeaderOffset() {
      const header = document.querySelector(".site-header");
      return header ? header.offsetHeight + 14 : 84;
    }

    function scrollToSection(sectionId) {
      const target = document.getElementById(sectionId);
      if (!target) return false;

      const top = target.getBoundingClientRect().top + window.pageYOffset - getHeaderOffset();
      window.scrollTo({
        top: top,
        behavior: "smooth"
      });
      return true;
    }

    function goToSection(sectionId) {
      const currentPath = window.location.pathname;
      const onLanding = currentPath === landingPath;

      if (onLanding) {
        const ok = scrollToSection(sectionId);
        if (ok) {
          history.replaceState(null, "", "#" + sectionId);
        }
      } else {
        window.location.href = landingPath + "#" + sectionId;
      }
    }

    if (btn) {
      btn.addEventListener("click", function () {
        if (drawer && drawer.classList.contains("is-open")) {
          closeDrawer();
        } else {
          openDrawer();
        }
      });
    }

    if (closeBtn) {
      closeBtn.addEventListener("click", closeDrawer);
    }

    if (drawer) {
      drawer.addEventListener("click", function (e) {
        if (e.target === drawer) {
          closeDrawer();
        }
      });
    }

    document.querySelectorAll(".js-nav-link").forEach(function (link) {
      link.addEventListener("click", function (e) {
        e.preventDefault();
        const sectionId = this.dataset.target;
        closeDrawer();
        if (sectionId) {
          goToSection(sectionId);
        }
      });
    });

    if (window.location.hash) {
      const initialId = window.location.hash.replace("#", "");
      setTimeout(function () {
        scrollToSection(initialId);
      }, 120);
    }
  });
</script>
