{% extends "base.html" %}

{% block content %}
<form id="googleAutoSubmit" method="post" action="">
  {% csrf_token %}
  <noscript>
    <div style="max-width:560px;margin:60px auto;padding:24px;background:#fff;border:1px solid #e5e7eb;border-radius:20px;">
      <h1>Continue with Google</h1>
      <p>Press continue to start Google sign in.</p>
      <button type="submit" class="btn btn-solid">Continue</button>
    </div>
  </noscript>
</form>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("googleAutoSubmit");
    if (form) form.submit();
  });
</script>
{% endblock %}
