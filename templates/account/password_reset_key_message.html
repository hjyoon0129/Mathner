<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mathner PIN/비밀번호 변경 안내</title>
</head>
<body style="margin:0; padding:0; background:#fff8e7; font-family:Arial, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fff8e7; padding:32px 12px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px; background:#ffffff; border:4px solid #ffcb3c; border-radius:28px; overflow:hidden;">
          <tr>
            <td style="padding:34px 28px; text-align:center;">
              <div style="font-size:44px; line-height:1; margin-bottom:12px;">🔐</div>

              <h1 style="margin:0 0 12px; color:#ff8f00; font-size:30px; line-height:1.25; font-weight:900;">
                매스너 PIN 변경하기
              </h1>

              <p style="margin:0 0 22px; color:#5f4f45; font-size:16px; line-height:1.7; font-weight:700;">
                안녕하세요, {{ user.username }} 님.<br>
                매스너 계정의 PIN/비밀번호 변경 요청이 접수되었어요.
              </p>

              <a href="{{ password_reset_url }}"
                 style="display:inline-block; padding:16px 30px; background:#ff9800; color:#ffffff; text-decoration:none; border-radius:18px; font-size:18px; font-weight:900;">
                ✨ 매스너 PIN 변경하기
              </a>

              <p style="margin:24px 0 0; color:#7a6658; font-size:14px; line-height:1.7;">
                본인이 요청하지 않았다면 이 메일은 무시해도 됩니다.<br>
                링크는 일정 시간이 지나면 만료될 수 있어요.
              </p>

              <div style="margin-top:24px; padding:14px 16px; background:#fff8e7; border:1px dashed #ffcb3c; border-radius:16px; text-align:left;">
                <p style="margin:0 0 8px; color:#7a6658; font-size:13px; line-height:1.6; font-weight:700;">
                  버튼이 눌리지 않으면 아래 주소를 복사해서 브라우저에 붙여넣어 주세요.
                </p>
                <p style="margin:0; word-break:break-all; color:#3366cc; font-size:13px; line-height:1.6;">
                  {{ password_reset_url }}
                </p>
              </div>

              <p style="margin:24px 0 0; color:#9a887a; font-size:13px; line-height:1.6;">
                Mathner 서비스를 이용해 주셔서 감사합니다.<br>
                <a href="https://mathner.com" style="color:#ff8f00; text-decoration:none; font-weight:800;">mathner.com</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
