{% extends "base_app.html" %}

{% block title %}PIN 변경 완료 | Mathner{% endblock %}

{% block extra_css %}
<style>
  .pin-done-page {
    width: min(100%, 760px);
    margin: 36px auto 64px;
    padding: 0 12px;
  }

  .pin-done-card {
    background: #fff;
    border: 5px solid #f4c542;
    border-radius: 34px;
    box-shadow: 0 12px 0 rgba(244, 197, 66, 0.25);
    padding: 38px 28px 32px;
    text-align: center;
  }

  .pin-done-icon {
    font-size: 48px;
    line-height: 1;
    margin-bottom: 12px;
  }

  .pin-done-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    border-radius: 999px;
    background: #fff7da;
    color: #ff8f00;
    font-size: 14px;
    font-weight: 900;
    margin-bottom: 14px;
  }

  .pin-done-title {
    margin: 0 0 12px;
    font-size: clamp(30px, 4.8vw, 44px);
    line-height: 1.15;
    font-weight: 900;
    color: #ff8f00;
    letter-spacing: -0.5px;
  }

  .pin-done-desc {
    margin: 0 auto 24px;
    max-width: 560px;
    color: #6f5d52;
    font-size: 17px;
    font-weight: 800;
    line-height: 1.6;
    word-break: keep-all;
  }

  .pin-done-actions {
    width: min(100%, 560px);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .pin-done-primary,
  .pin-done-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 56px;
    border-radius: 18px;
    text-decoration: none;
    font-size: 18px;
    font-weight: 900;
    transition: transform 0.1s ease, background 0.15s ease;
  }

  .pin-done-primary {
    background: #ff9800;
    color: #fff;
    box-shadow: 0 6px 0 #d67d00;
  }

  .pin-done-secondary {
    background: #fff8e8;
    color: #8b5d00;
    border: 2px solid #f4c542;
  }

  .pin-done-primary:hover,
  .pin-done-secondary:hover {
    transform: translateY(-1px);
  }

  @media (max-width: 768px) {
    .pin-done-page {
      margin: 24px auto 42px;
      padding: 0 10px;
    }

    .pin-done-card {
      border-radius: 26px;
      padding: 28px 18px 24px;
    }

    .pin-done-title {
      font-size: 34px;
    }

    .pin-done-desc {
      font-size: 15px;
    }

    .pin-done-primary,
    .pin-done-secondary {
      min-height: 52px;
      font-size: 16px;
      border-radius: 16px;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="pin-done-page">
  <div class="pin-done-card">
    <div class="pin-done-icon">🎉</div>
    <div class="pin-done-badge">PIN 변경 완료</div>

    <h1 class="pin-done-title">새 PIN으로 바뀌었어요!</h1>

    <p class="pin-done-desc">
      이제 매스너 아이디와 새 PIN으로 다시 로그인할 수 있어요.
    </p>

    <div class="pin-done-actions">
      <a href="{% url 'account_login' %}" class="pin-done-primary">로그인하러 가기</a>
      <a href="{{ mathner_app_home_url|default:'/' }}" class="pin-done-secondary">홈으로 가기</a>
    </div>
  </div>
</div>
{% endblock %}
