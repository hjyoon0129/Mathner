{% extends "base_app.html" %}
{% load i18n %}

{% block title %}비밀번호 변경 완료 | Mathner{% endblock %}

{% block extra_css %}
<style>
  .auth-page-wrap{
    min-height: calc(100vh - 140px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px 60px;
  }
  .auth-card{
    width:min(100%, 560px);
    background:#fffdf8;
    border:5px solid #f3c13a;
    border-radius:34px;
    box-shadow:0 14px 0 rgba(243, 193, 58, 0.25);
    padding:34px 26px 30px;
    text-align:center;
  }
  .auth-icon{
    font-size:54px;
    margin-bottom:8px;
  }
  .auth-title{
    margin:0 0 12px;
    font-size:38px;
    line-height:1.12;
    font-weight:900;
    color:#ff8f00;
    letter-spacing:-0.8px;
  }
  .auth-desc{
    margin:0 0 22px;
    color:#6b5a4e;
    font-size:16px;
    line-height:1.7;
    font-weight:700;
    word-break:keep-all;
  }
  .auth-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:220px;
    height:56px;
    padding:0 20px;
    border-radius:18px;
    background:#ff9800;
    color:#fff;
    text-decoration:none;
    font-size:20px;
    font-weight:900;
    box-shadow:0 7px 0 #dc7f00;
  }
  .auth-btn:active{
    transform:translateY(6px);
    box-shadow:0 1px 0 #dc7f00;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-page-wrap">
  <section class="auth-card">
    <div class="auth-icon">✅</div>
    <h1 class="auth-title">변경이 완료됐어요!</h1>
    <p class="auth-desc">
      새 비밀번호가 저장되었어요.<br>
      이제 새 정보로 다시 로그인할 수 있어요.
    </p>

    <a href="{% url 'account_login' %}" class="auth-btn">로그인하러 가기</a>
  </section>
</div>
{% endblock %}
