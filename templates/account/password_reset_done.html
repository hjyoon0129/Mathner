{% extends "base_app.html" %}
{% load i18n %}

{% block title %}메일 전송 완료 | Mathner{% endblock %}

{% block extra_css %}
<style>
  .auth-page-wrap{
    min-height: calc(100vh - 140px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px 60px;
  }
  .auth-card{
    width:min(100%, 560px);
    background:#fffdf8;
    border:5px solid #f3c13a;
    border-radius:34px;
    box-shadow:0 14px 0 rgba(243, 193, 58, 0.25);
    padding:34px 26px 30px;
    text-align:center;
  }
  .auth-icon{
    font-size:52px;
    margin-bottom:10px;
  }
  .auth-title{
    margin:0 0 12px;
    font-size:38px;
    line-height:1.12;
    font-weight:900;
    color:#ff8f00;
    letter-spacing:-0.8px;
  }
  .auth-desc{
    margin:0 0 20px;
    color:#6b5a4e;
    font-size:16px;
    line-height:1.7;
    font-weight:700;
    word-break:keep-all;
  }
  .auth-info{
    margin:0 0 20px;
    padding:16px;
    border-radius:18px;
    border:2px dashed #f3c13a;
    background:#fff8e7;
    color:#6b5a4e;
    font-size:14px;
    line-height:1.6;
    font-weight:700;
    word-break:keep-all;
  }
  .auth-btn-row{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .auth-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:180px;
    height:54px;
    padding:0 20px;
    border-radius:18px;
    background:#ff9800;
    color:#fff;
    text-decoration:none;
    font-size:18px;
    font-weight:900;
    box-shadow:0 7px 0 #dc7f00;
  }
  .auth-btn:active{
    transform:translateY(6px);
    box-shadow:0 1px 0 #dc7f00;
  }
  .auth-btn.secondary{
    background:#fff;
    color:#ff8f00;
    border:2px solid #f3c13a;
    box-shadow:none;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-page-wrap">
  <section class="auth-card">
    <div class="auth-icon">📮</div>
    <h1 class="auth-title">메일을 보냈어요!</h1>
    <p class="auth-desc">
      입력한 이메일 주소가 가입 정보와 일치하면<br>
      PIN/비밀번호 재설정 안내 메일이 전송돼요.
    </p>

    <div class="auth-info">
      메일이 바로 안 올 수도 있어요.<br>
      1~5분 정도 기다린 뒤 <strong>스팸함</strong>도 꼭 확인해보세요.
    </div>

    <div class="auth-btn-row">
      <a href="{% url 'account_login' %}" class="auth-btn">로그인 화면으로</a>
      <a href="{% url 'account_reset_password' %}" class="auth-btn secondary">다시 입력하기</a>
    </div>
  </section>
</div>
{% endblock %}
