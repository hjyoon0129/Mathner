{% extends "admin/base_site.html" %}

{% block content %}
  <h1>{{ title }}</h1>

  <p><strong>Selected effects:</strong> {{ selected_count }}</p>

  <form method="post" style="max-width:720px;">
    {% csrf_token %}
    {{ form.as_p }}

    <h2>Effects to grant</h2>
    <div style="margin:12px 0 20px; padding:12px; border:1px solid #ddd; background:#fff;">
      <ul style="margin:0; padding-left:20px;">
        {% for effect_key in effects %}
          <li>{{ effect_key }}</li>
        {% endfor %}
      </ul>
    </div>

    <button type="submit" class="default">Grant checked effects</button>
    <a href="../" style="margin-left:10px;">Cancel</a>
  </form>
{% endblock %}
